services:
  clawlcm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: clawlcm:latest
    container_name: clawlcm
    environment:
      - TZ=UTC
    volumes:
      - clawlcm-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sqlite3", "/app/data/clawlcm.db", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  clawlcm-data: