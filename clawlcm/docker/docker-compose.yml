services:
  picolcm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: picolcm:latest
    container_name: picolcm
    environment:
      - TZ=UTC
    volumes:
      - picolcm-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sqlite3", "/app/data/picolcm.db", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  picolcm-data:
